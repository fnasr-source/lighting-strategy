name: Deploy Campaign Sites
on:
  push:
    branches: [main]
    paths: ['campaigns/*/public/**']

jobs:
  deploy-lup-2026:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.modified, 'campaigns/lup-2026/') || contains(github.event.head_commit.added, 'campaigns/lup-2026/')
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: admireworks---internal-os
          target: lup-2026
          channelId: live
